<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenida</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body{ background:#f5f7fb; }
    .page-center{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 12px; }
    .resource-card{ width:100%; max-width:980px; border:0; border-radius:16px; box-shadow:0 18px 45px rgba(0,0,0,.12); overflow:hidden; background:#fff; }
    .resource-card-header{ padding:22px 24px; border-bottom:1px solid rgba(0,0,0,.06); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .header-left{ display:flex; align-items:center; gap:16px; }
    .resource-card-header img{ width:130px; height:auto; display:block; }
    .resource-card-header h4{ margin:0; font-weight:700; letter-spacing:.2px; }
    .resource-card-header small{ display:block; margin-top:4px; color:#6c757d; }
    .resource-card-body{ padding:22px 24px 26px; }

    .menu-grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-top:12px; }
    @media (max-width:768px){ .menu-grid{ grid-template-columns:1fr; } }

    .menu-card{
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      padding:16px;
      background:#fff;
      transition: transform .08s ease, box-shadow .12s ease;
      cursor:pointer;
      user-select:none;
    }
    .menu-card:hover{ transform: translateY(-2px); box-shadow:0 12px 26px rgba(0,0,0,.10); }
    .menu-card h6{ margin:0; font-weight:800; }
    .menu-card p{ margin:8px 0 0; color:#6c757d; }
    .btn{ border-radius:10px; min-height:42px; font-weight:600; }

    .empty-state{
      display:none;
      padding:18px;
      border:1px dashed rgba(0,0,0,.15);
      border-radius:12px;
      text-align:center;
      color:#6c757d;
      margin-top:12px;
    }
  </style>
</head>

<body class="main-layout">
  <div class="page-center">
    <div class="resource-card">

      <div class="resource-card-header">
        <div class="header-left">
          <img src="../images/logo.png" alt="Logo">
          <div>
            <h4>Bienvenido</h4>
            <small>Opciones disponibles según tu rol</small>
          </div>
        </div>

        <div class="header-right d-flex gap-2">
          <button class="btn btn-outline-secondary" id="btnReloadMenu">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
          <button class="btn btn-outline-secondary" id="btnLogout">
            <i class="fa-solid fa-right-from-bracket"></i> Salir
          </button>
        </div>
      </div>

      <div class="resource-card-body">
        <div id="menuGrid" class="menu-grid"></div>
        <div id="emptyState" class="empty-state">No tienes opciones asignadas en el menú.</div>
      </div>
    </div>
  </div>

  <script src="../js/jquery.min.js"></script>
  <script src="../js/bootstrap.bundle.min.js"></script>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/menu.service.js"></script>
  <script src="../js/auth.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    requireAuthOrRedirect();

    const grid = document.getElementById("menuGrid");
    const emptyState = document.getElementById("emptyState");

    //Bloque onesignal
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function (OneSignal) {
    
      await OneSignal.init({
        appId: "c4d82155-7c0f-498b-b63f-8c96ae733884",
        notifyButton: { enable: false },
        serviceWorkerParam: { scope: "../" },
        serviceWorkerPath: "/OneSignalSDKWorker.js",
        serviceWorkerUpdaterPath: "/OneSignalSDKUpdaterWorker.js",
      });
    
      console.log("OneSignal init OK");
    
      // 1️⃣ Pedir permiso si aún no existe
      console.log("Primero",OneSignal.Notifications.permission);
      if (OneSignal.Notifications.permission !== true) {
        await OneSignal.Notifications.requestPermission();
      }
      console.log("Segundo",OneSignal.Notifications.permission);
    
      if (OneSignal.Notifications.permission !== true) {
        console.log("Usuario no permitió notificaciones");
        return;
      }
    
      // 2️⃣ Forzar suscripción
      if (OneSignal.User?.PushSubscription?.optIn) {
        await OneSignal.User.PushSubscription.optIn();
      }
    
      // 3️⃣ Esperar que exista subscription REAL
      let subId = null;
      for (let i = 0; i < 20; i++) {
        subId = OneSignal.User?.PushSubscription?.id ?? null;
        if (subId) break;
        await new Promise(r => setTimeout(r, 500));
      }
    
      console.log("SubId:", subId);
    
      if (!subId) {
        console.log("No hay SubId todavía");
        return;
      }
    
      // 4️⃣ AHORA sí vincular usuario
      const idUsuario = localStorage.getItem("id_usuario");
      if (!idUsuario) {
        console.log("No hay id_usuario");
        return;
      }
    
      await OneSignal.login(String(idUsuario));
      console.log("External ID vinculado:", idUsuario);
    
    });
    //FIN bloque signal

    function iconEmoji(icon){
      // puedes cambiar a fontawesome luego; por ahora algo simple
      const map = {
        checklist: "✅",
        box: "📦",
        settings: "⚙️",
        users: "👥"
      };
      return map[icon] || "📌";
    }

    function renderMenu(items){
      grid.innerHTML = "";

      if(!items || !items.length){
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";

      // ordena por "orden"
      items.sort((a,b) => (a.orden ?? 999) - (b.orden ?? 999));

      items.forEach(m => {
        // Tu backend manda path "/tareas". Nosotros mapeamos a páginas reales.
        // Ajusta este mapping si tus páginas se llaman distinto.
        const pageMap = {
          "/tareas": "./Tareas/listarTareas.html",
          "/recursos": "./Recursos/listarRecursos.html",
          "/usuarios": "./Seguridad/listarUsuarios.html",
          "/roles": "./Seguridad/listarRoles.html",
          "/reportes":"./Reportes/dashboard.html"
        };

        const href = pageMap[m.path] || "#";

        const div = document.createElement("div");
        div.className = "menu-card";
        div.innerHTML = `
          <h6>${iconEmoji(m.icon)} ${m.label}</h6>
          <p>${m.clave || ""}</p>
          <div class="mt-3 d-flex gap-2 flex-wrap">
            <a class="btn btn-primary" href="${href}">Entrar</a>
          </div>
        `;

        div.addEventListener("click", (e) => {
          if(e.target.closest("a,button")) return;
          if(href !== "#") window.location.href = href;
        });

        grid.appendChild(div);
      });
    }

    async function loadAndRenderMenu(force=false){
      console.log("Entrq q construir menu");
      // Si ya hay menú guardado y no es force, usa cache
      let menu = loadMenu();
      if(force || !menu.length){
        const apiMenu = await fetchMenuFromApi();
        menu = Array.isArray(apiMenu) ? apiMenu : (apiMenu?.data || []);
        saveMenu(menu);
      }
      renderMenu(menu);
    }

    document.getElementById("btnLogout").addEventListener("click", logout);
    document.getElementById("btnReloadMenu").addEventListener("click", async () => {
      try{
        await loadAndRenderMenu(true);
      }catch(err){
        alert(err.message || "No se pudo actualizar el menú");
      }
    });

    loadAndRenderMenu(false).catch(err => {
      alert(err.message || "No se pudo cargar el menú");
    });
  </script>
</body>
</html>
